version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: volleyops
      MYSQL_ROOT_PASSWORD: Pass123
    ports:
      - "3307:3306"  
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: on-failure  
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  db_data: